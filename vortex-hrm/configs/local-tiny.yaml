# VORTEX config: laptop track — tiny 0.5B model (experimental)
# WARNING: qwen2.5:0.5b CANNOT follow the XML-based planner contract.
#          Expects simplified prompts (not yet implemented).
#          Use local.yaml with qwen2.5:7b for reliable results.
llm:
  mode: ollama
  model: qwen2.5:0.5b
  base_url: http://localhost:11434/v1
  temperature: 0.0
  max_tokens: 2048

engine:
  max_spirals: 10
  confidence_threshold: 0.85
  entropy_stall_limit: 3
  context_budget: 4096
  verbose: true
